<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS GERADOR DE SENHAS</title>
</head>
<body>
    <section class="conteudo">
        <div class="conteudo">
            <img src="unlock.svg" alt="cadeadofechado">
            <h2 class="titulo-principal">Gerador de senhas</h2>
            <h3 class="titulo secundario">Gere instantanemente uma senha procurada e segura </h3>
        </div>
        <div class="conteudo-senha"
          <label for="senha">Senha</label>
          <input name="senha" type="text" id="campo-senha" somente leitura>
      </div>
    </section>
   
</body>
</html>
